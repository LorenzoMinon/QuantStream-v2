version: 2

models:
  - name: prices
    description: "Unified price table combining crypto, US stocks and FX rates from all sources"
    columns:
      - name: asset
        description: "Asset symbol (e.g. BTCUSDT, AAPL, ARS_BLUE)"
        tests:
          - not_null
      - name: asset_type
        description: "Type of asset: crypto, stock_usa, stock_ar or fx"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['crypto', 'stock_usa', 'stock_ar', 'fx']
      - name: price_date
        description: "Date or timestamp of the price"
        tests:
          - not_null
      - name: price
        description: "Closing price in the original currency"
        tests:
          - not_null
      - name: currency
        description: "Currency of the price (USD or ARS)"
        tests:
          - not_null
      - name: source
        description: "Data source: binance, alphavantage or dolarapi"
        tests:
          - not_null

  - name: portfolio
    description: "Personal portfolio positions enriched with latest market prices"
    columns:
      - name: asset
        description: "Asset symbol matching silver.prices"
        tests:
          - not_null
          - unique
      - name: asset_type
        description: "Type of asset: crypto, stock_usa, stock_ar or cash"
        tests:
          - not_null
      - name: quantity
        description: "Number of units held"
        tests:
          - not_null
      - name: buy_price
        description: "Purchase price per unit"
        tests:
          - not_null
      - name: buy_currency
        description: "Currency of the purchase price"
        tests:
          - not_null
      - name: buy_date
        description: "Date of purchase"
        tests:
          - not_null
      - name: current_price
        description: "Latest available market price"
      - name: current_currency
        description: "Currency of the current price"
      - name: price_last_updated
        description: "Timestamp of the latest price used"